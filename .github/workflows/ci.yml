name: CI

on:
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npx tsc --noEmit

  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - name: Cross-compile linux/arm64
        run: GOOS=linux GOARCH=arm64 go build -o bin/monitor ./server/cmd/
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: monitor-arm64
          path: bin/monitor
          retention-days: 7
