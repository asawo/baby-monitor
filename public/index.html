<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>May Monitor</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👶</text></svg>">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif;
      margin: 0;
      background: #f7f7f5;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
    }

    #app {
      width: 100%;
      max-width: min(90vw, 960px);
      height: 100%;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin: 0;
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #aaa;
      flex-shrink: 0;
    }

    #status-btn {
      background: none;
      color: #888;
      border: none;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      width: auto;
      height: auto;
      transition: background 0.15s;
    }

    #status-btn:hover { background: #e5e5e3; }
    #status-btn.ok { color: #16a34a; }
    #status-btn.err { color: #dc2626; }
    #status-btn.ok #status-dot { background: #4ade80; }
    #status-btn.err #status-dot { background: #f87171; }

    #log-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    #log-modal.open { display: flex; }

    #log-card {
      background: #111;
      color: #f7f7f5;
      border-radius: 6px;
      padding: 14px;
      width: 100%;
      max-width: 680px;
      max-height: 75vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #log-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    #log-card-header > span {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #888;
    }

    #log-close-btn {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      padding: 0;
      line-height: 0;
      width: auto;
      height: auto;
    }

    #log-close-btn:hover { color: #f7f7f5; }

    #log-content {
      overflow-y: auto;
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 0.7rem;
      line-height: 1.5;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .log-section-header {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }

    .log-section-header .material-icons {
      font-size: 14px;
      color: #555;
      transition: transform 0.15s;
    }

    .log-section.open .log-section-header .material-icons {
      transform: rotate(90deg);
    }

    .log-section-body {
      white-space: pre;
      color: #ccc;
      display: none;
    }

    .log-section.open .log-section-body {
      display: block;
    }

    #monitor-panel {
      width: 100%;
      flex: 1;
      min-height: 0;
      /* cap at 2× natural 16:9 height + audio section height (~90px) */
      max-height: calc((min(90vw, 960px) - 32px) * 9 / 8 + 90px);
      border: 1.5px solid #e5e5e3;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #container {
      position: relative;
      width: 100%;
      flex: 1;
      min-height: 0;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #000;
    }

    :fullscreen video,
    :-webkit-full-screen video { width: 100%; height: 100%; object-fit: contain; }

    :fullscreen #container,
    :-webkit-full-screen #container {
      width: 100%;
      height: 100%;
      max-width: none;
      max-height: none;
      background: #000;
    }

    #audio-section {
      background: #fff;
      border-top: 1.5px solid #e5e5e3;
      padding: 8px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex-shrink: 0;
    }

    #audio-label {
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #aaa;
    }

    #waveform {
      width: 100%;
      height: 52px;
      background: #f0f0ee;
      border-radius: 3px;
      display: block;
    }

    button {
      padding: 8px;
      cursor: pointer;
      background: #111;
      color: #f7f7f5;
      border: none;
      border-radius: 4px;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:hover { background: #333; }

    button { width: 40px; height: 40px; }

    button .material-icons { font-size: 18px; }

    #overlay {
      display: flex;
      position: absolute;
      bottom: 16px;
      right: 16px;
      gap: 8px;
    }

    #overlay button {
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    #overlay button:hover { background: rgba(0, 0, 0, 0.8); }

    #cry-alert {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(239, 68, 68, 0.88);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      display: none;
      white-space: nowrap;
      pointer-events: none;
      animation: cry-pulse 1.2s ease-in-out infinite;
    }

    #cry-alert.visible { display: block; }

    @keyframes cry-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    #action-bar {
      display: flex;
      gap: 8px;
      width: 100%;
      margin-top: 8px;
      flex-shrink: 0;
    }

    #action-bar button {
      flex: 1;
      width: auto;
      height: 40px;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    #notify-btn, #log-btn {
      background: #e5e5e3;
      color: #111;
    }

    #notify-btn:hover, #log-btn:hover { background: #d4d4d2; }

    #notify-btn.disabled {
      opacity: 0.45;
    }

    #detect-error {
      display: none;
      font-size: 0.7rem;
      color: #f87171;
      width: 100%;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    #detect-error.visible { display: block; }

    @media (min-width: 700px) {
      #app { padding: 32px; }
      h1 { font-size: 1.5rem; }
      #header { margin-bottom: 20px; gap: 20px; }
      #status-dot { width: 10px; height: 10px; }
      #status-btn { font-size: 0.95rem; padding: 8px 14px; }
      #audio-section { padding: 12px 20px 16px; gap: 8px; }
      #audio-label { font-size: 0.78rem; }
      #waveform { height: 80px; }
      button { width: 56px; height: 56px; }
      button .material-icons { font-size: 26px; }
      #action-bar { margin-top: 16px; gap: 12px; }
      #action-bar button { height: 58px; font-size: 1.05rem; }
    }

  </style>
</head>
<body>
  <div id="app">
  <div id="log-modal" onclick="closeLogModal()">
    <div id="log-card" onclick="event.stopPropagation()">
      <div id="log-card-header">
        <span>Service Logs</span>
        <button id="log-close-btn" onclick="closeLogModal()" aria-label="Close"><span class="material-icons">close</span></button>
      </div>
      <div id="log-content"></div>
    </div>
  </div>

  <div id="header">
    <h1>May Monitor</h1>
    <button id="status-btn" onclick="openLogModal()" aria-label="Service status">
      <span id="status-dot"></span>
      <span id="status-label">—</span>
    </button>
  </div>

  <div id="monitor-panel">
    <div id="container">
      <video id="video" autoplay playsinline muted></video>
      <div id="cry-alert">Crying detected</div>
      <div id="overlay">
        <button id="overlayMuteBtn" onclick="toggleMute()" aria-label="Unmute"><span class="material-icons">volume_off</span></button>
        <button id="overlayFsBtn" onclick="toggleFullscreen()" aria-label="Fullscreen"><span class="material-icons">fullscreen</span></button>
      </div>
    </div>
    <div id="audio-section">
      <span id="audio-label">Audio Activity</span>
      <canvas id="waveform"></canvas>
    </div>
  </div>

  <div id="action-bar">
    <button id="notify-btn" onclick="toggleNotifications()" aria-label="Disable notifications">
      <span class="material-icons">notifications</span>
      <span>Notifications</span>
    </button>
    <button id="log-btn" onclick="openLogModal()" aria-label="Service logs">
      <span class="material-icons">list</span>
      <span>Logs</span>
    </button>
  </div>
  <div id="detect-error"></div>
  </div>

  <script>
    const video = document.getElementById('video');
    const whepUrl = `http://${location.hostname}:8889/baby/whep`;

    const canvas = document.getElementById('waveform');
    const ctx = canvas.getContext('2d');
    let analyser, waveBuffer, audioCtx, pendingAudioStream;
    let history, histPos, lastTick;

    // --- Tuning knobs ---
    const SCROLL_MS = 300;      // ms per bar scroll (higher = slower)
    const SENSITIVITY = 4;      // visual amplification (higher = more reactive)
    const YELLOW_THRESHOLD = 0.1; // fraction of max amplitude where green → yellow
    const RED_THRESHOLD = 0.3;    // fraction of max amplitude where yellow → red
    const BAR_W = 3;              // bar width in px
    const BAR_GAP = 1;            // gap between bars in px
    // --------------------

    function calcNumBars() { return Math.floor(canvas.width / (BAR_W + BAR_GAP)); }

    function drawWaveform() {
      requestAnimationFrame(drawWaveform);
      if (!analyser) return;

      const now = performance.now();
      if (now - lastTick < SCROLL_MS) return;
      lastTick = now;

      analyser.getByteTimeDomainData(waveBuffer);
      let peak = 0;
      for (let i = 0; i < waveBuffer.length; i++) {
        peak = Math.max(peak, Math.abs(waveBuffer[i] - 128));
      }
      history[histPos++ % history.length] = peak / 128;

      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      const step = BAR_W + BAR_GAP;
      const n = history.length;
      const colors = ['#4ade80', '#facc15', '#f87171'];

      for (let i = 0; i < n; i++) {
        const val = history[(histPos + i) % n];
        const barH = val * h * SENSITIVITY;
        const tier = val < YELLOW_THRESHOLD ? 0 : val < RED_THRESHOLD ? 1 : 2;
        ctx.fillStyle = colors[tier];
        ctx.fillRect(i * step, h - barH, BAR_W, barH);
      }
    }

    function setupAnalyser(stream) {
      audioCtx = new AudioContext();
      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0;
      waveBuffer = new Uint8Array(analyser.frequencyBinCount);
      source.connect(analyser);
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      history = new Float32Array(calcNumBars()).fill(0);
      histPos = 0;
      lastTick = 0;
    }

    new ResizeObserver(() => {
      const newW = canvas.offsetWidth;
      const newH = canvas.offsetHeight;
      if (newW === canvas.width && newH === canvas.height) return;
      canvas.width = newW;
      canvas.height = newH;
      if (history) {
        const oldN = history.length;
        const newN = calcNumBars();
        const newHistory = new Float32Array(newN).fill(0);
        if (newN >= oldN) {
          for (let i = 0; i < oldN; i++)
            newHistory[newN - oldN + i] = history[(histPos + i) % oldN];
        } else {
          for (let i = 0; i < newN; i++)
            newHistory[i] = history[(histPos + oldN - newN + i) % oldN];
        }
        history = newHistory;
        histPos = 0;
      }
    }).observe(canvas);

    drawWaveform(); // start the loop once; guards on analyser being non-null

    let wasAudioActive = false;

    document.addEventListener('click', () => {
      if (pendingAudioStream && !audioCtx) {
        wasAudioActive = true;
        setupAnalyser(pendingAudioStream);
      } else if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    });

    const StreamStatus = Object.freeze({ UNKNOWN: 'unknown', CONNECTED: 'connected', RECONNECTING: 'reconnecting', FAILED: 'failed' });

    let pc = null;
    let reconnectTimer = null;
    let streamStatus = StreamStatus.UNKNOWN;

    function setStreamStatus(status) {
      streamStatus = status;
      switch (status) {
        case StreamStatus.RECONNECTING:
          statusBtn.className = 'err';
          updateStatusLabel('Reconnecting');
          break;
        case StreamStatus.FAILED:
          statusBtn.className = 'err';
          updateStatusLabel('Failed');
          break;
        // CONNECTED is handled by pollStatus on its next tick
      }
    }

    function reconnect() {
      if (pc) { pc.close(); pc = null; }
      video.srcObject = null;
      if (audioCtx) { audioCtx.close(); audioCtx = null; analyser = null; pendingAudioStream = null; }
      setStreamStatus(StreamStatus.RECONNECTING);
      setTimeout(() => start().catch(() => reconnect()), 2000);
    }

    async function start() {
      pc = new RTCPeerConnection();

      pc.ontrack = e => {
        if (e.track.kind === 'video') video.srcObject = e.streams[0];
        if (e.track.kind === 'audio') {
          pendingAudioStream = e.streams[0];
          if (wasAudioActive) setupAnalyser(pendingAudioStream);
        }
      };

      pc.onconnectionstatechange = () => {
        switch (pc.connectionState) {
          case 'connected':
            clearTimeout(reconnectTimer);
            streamStatus = StreamStatus.CONNECTED;
            statusBtn.className = 'ok';
            updateStatusLabel('Connected');
            pollStatus();
            break;
          case 'disconnected':
            reconnectTimer = setTimeout(reconnect, 4000);
            setStreamStatus(StreamStatus.RECONNECTING);
            break;
          case 'failed':
          case 'closed':
            clearTimeout(reconnectTimer);
            setStreamStatus(StreamStatus.FAILED);
            reconnect();
            break;
        }
      };

      pc.addTransceiver('video', { direction: 'recvonly' });
      pc.addTransceiver('audio', { direction: 'recvonly' });

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      const res = await fetch(whepUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/sdp' },
        body: offer.sdp,
      });

      if (!res.ok) {
        document.body.insertAdjacentHTML('beforeend', `<p>Stream unavailable (${res.status})</p>`);
        return;
      }

      const answer = await res.text();
      await pc.setRemoteDescription({ type: 'answer', sdp: answer });
    }

    function toggleMute() {
      video.muted = !video.muted;
      const icon = video.muted ? 'volume_off' : 'volume_up';
      const label = video.muted ? 'Unmute' : 'Mute';
      const btn = document.getElementById('overlayMuteBtn');
      btn.innerHTML = `<span class="material-icons">${icon}</span>`;
      btn.setAttribute('aria-label', label);
    }

    function toggleFullscreen() {
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      } else {
        const el = document.getElementById('container');
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      }
    }

    document.addEventListener('fullscreenchange', updateFsBtn);
    document.addEventListener('webkitfullscreenchange', updateFsBtn);

    function updateFsBtn() {
      const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
      const btn = document.getElementById('overlayFsBtn');
      btn.innerHTML = `<span class="material-icons">${inFs ? 'fullscreen_exit' : 'fullscreen'}</span>`;
      btn.setAttribute('aria-label', inFs ? 'Exit fullscreen' : 'Fullscreen');
    }

    start().catch(err => {
      document.body.insertAdjacentHTML('beforeend', `<p>Error: ${err.message}</p>`);
    });

    // --- Status widget ---
    const statusBtn = document.getElementById('status-btn');

    function updateStatusLabel(text) {
      document.getElementById('status-label').textContent = text;
    }

    async function pollStatus() {
      // Don't overwrite a stream-level error with a server-health indicator
      if (streamStatus === StreamStatus.RECONNECTING || streamStatus === StreamStatus.FAILED) return;
      try {
        const res = await fetch('/api/status');
        const services = await res.json();
        const down = services.filter(s => !s.active);
        statusBtn.className = down.length === 0 ? 'ok' : 'err';
        updateStatusLabel(down.length === 0 ? 'Connected' : 'Issue');
      } catch {
        statusBtn.className = 'err';
        updateStatusLabel('Issue');
      }
    }

    pollStatus();
    setInterval(pollStatus, 10_000);

    const LOG_SECTION_COLORS = {
      'mediamtx':           '#60a5fa', // blue
      'stream.service':     '#34d399', // green
      'monitor-http.service': '#f472b6', // pink
      'detect.service':     '#fb923c', // orange
    };
    const LOG_SECTION_COLOR_FALLBACK = '#aaa';

    const LOG_MAX_LINES = 30;

    async function openLogModal() {
      document.getElementById('log-modal').classList.add('open');
      const container = document.getElementById('log-content');
      container.innerHTML = '<span style="color:#888">Loading…</span>';
      try {
        const res = await fetch('/api/logs');
        const sections = await res.json();
        container.innerHTML = '';
        sections.forEach(s => {
          const color = LOG_SECTION_COLORS[s.name] ?? LOG_SECTION_COLOR_FALLBACK;
          const lines = s.content.trimEnd().split('\n');
          const truncated = lines.slice(-LOG_MAX_LINES);
          const label = s.name;
          const div = document.createElement('div');
          div.className = 'log-section open';
          div.innerHTML = `
            <div class="log-section-header" style="color:${color}">
              <span>${label}</span>
              <span class="material-icons">chevron_right</span>
            </div>
            <div class="log-section-body">${truncated.join('\n').replace(/</g, '&lt;')}</div>`;
          div.querySelector('.log-section-header').addEventListener('click', () => {
            div.classList.toggle('open');
          });
          container.appendChild(div);
        });
      } catch (e) {
        container.innerHTML = '<span style="color:#f87171">Failed to load logs: ' + e.message + '</span>';
      }
    }

    function closeLogModal() {
      document.getElementById('log-modal').classList.remove('open');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLogModal();
    });

    // --- Notifications toggle ---
    const notifyBtn = document.getElementById('notify-btn');

    async function loadNotificationsState() {
      try {
        const res = await fetch('/api/notifications');
        const data = await res.json();
        updateNotifyBtn(data.enabled);
      } catch {}
    }

    async function toggleNotifications() {
      try {
        const res = await fetch('/api/notifications', { method: 'POST' });
        const data = await res.json();
        updateNotifyBtn(data.enabled);
      } catch {}
    }

    function updateNotifyBtn(enabled) {
      notifyBtn.querySelector('.material-icons').textContent = enabled ? 'notifications' : 'notifications_off';
      notifyBtn.setAttribute('aria-label', enabled ? 'Disable notifications' : 'Enable notifications');
      notifyBtn.classList.toggle('disabled', !enabled);
    }

    loadNotificationsState();

    // --- Cry detection indicator ---
    const cryAlert = document.getElementById('cry-alert');
    const CRY_RECENT_SECONDS = 10;

    async function pollCry() {
      try {
        const res = await fetch('/api/cry');
        const data = await res.json();
        const recent = data.detected_at !== null && data.seconds_ago < CRY_RECENT_SECONDS;
        cryAlert.classList.toggle('visible', recent);
      } catch {}
    }

    pollCry();
    setInterval(pollCry, 5000);

    // --- Detector error indicator ---
    const detectErrorEl = document.getElementById('detect-error');

    async function pollDetectStatus() {
      try {
        const res = await fetch('/api/detect-status');
        const data = await res.json();
        if (data.error) {
          detectErrorEl.textContent = 'Detector error: ' + data.error;
          detectErrorEl.classList.add('visible');
        } else {
          detectErrorEl.classList.remove('visible');
        }
      } catch {}
    }

    pollDetectStatus();
    setInterval(pollDetectStatus, 10_000);
  </script>
</body>
</html>
