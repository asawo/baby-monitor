<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>May Monitor</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👶</text></svg>">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 16px;
      background: #f7f7f5;
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin: 0 0 12px;
    }

    #status-btn {
      width: auto;
      height: 40px;
      padding: 0 10px;
      gap: 6px;
      font-size: 0.72rem;
      font-family: inherit;
      letter-spacing: 0.05em;
      background: #ddd;
      color: #111;
    }

    #status-btn:hover { background: #ccc; }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #aaa;
      flex-shrink: 0;
    }

    #status-btn.ok #status-dot { background: #4ade80; }
    #status-btn.err #status-dot { background: #f87171; }

    #log-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    #log-modal.open { display: flex; }

    #log-card {
      background: #111;
      color: #f7f7f5;
      border-radius: 6px;
      padding: 14px;
      width: 100%;
      max-width: 680px;
      max-height: 75vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #log-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    #log-card-header > span {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #888;
    }

    #log-close-btn {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      padding: 0;
      line-height: 0;
      width: auto;
      height: auto;
    }

    #log-close-btn:hover { color: #f7f7f5; }

    #log-content {
      overflow-y: auto;
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 0.7rem;
      line-height: 1.5;
      white-space: pre;
      flex: 1;
      min-height: 0;
      color: #ccc;
    }

    #container {
      position: relative;
      width: 100%;
      min-height: 0;
      aspect-ratio: 16 / 9;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 4px;
      object-fit: contain;
      background: #000;
    }

    :fullscreen video,
    :-webkit-full-screen video { width: 100%; height: 100%; object-fit: contain; }

    :fullscreen #container,
    :-webkit-full-screen #container {
      width: 100%;
      height: 100%;
      max-width: none;
      max-height: none;
      background: #000;
    }

    #controls {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      width: 100%;
      justify-content: flex-end;
      align-items: stretch;
    }

    #waveform {
      flex: 1;
      min-width: 0;
      height: 40px;
      background: #ddd;
      border-radius: 4px;
      display: block;
    }

    button {
      padding: 8px;
      cursor: pointer;
      background: #111;
      color: #f7f7f5;
      border: none;
      border-radius: 4px;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:hover { background: #333; }

    button { width: 40px; height: 40px; }

    button .material-icons { font-size: 18px; }

    #overlay {
      display: flex;
      position: absolute;
      bottom: 16px;
      right: 16px;
      gap: 8px;
    }

    #overlay button {
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    #overlay button:hover { background: rgba(0, 0, 0, 0.8); }

  </style>
</head>
<body>
  <h1>May Monitor</h1>

  <div id="log-modal" onclick="closeLogModal()">
    <div id="log-card" onclick="event.stopPropagation()">
      <div id="log-card-header">
        <span>Service Logs</span>
        <button id="log-close-btn" onclick="closeLogModal()" aria-label="Close"><span class="material-icons">close</span></button>
      </div>
      <pre id="log-content">Loading…</pre>
    </div>
  </div>

  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <div id="overlay">
      <button id="overlayMuteBtn" onclick="toggleMute()" aria-label="Unmute"><span class="material-icons">volume_off</span></button>
      <button id="overlayFsBtn" onclick="toggleFullscreen()" aria-label="Fullscreen"><span class="material-icons">fullscreen</span></button>
    </div>
  </div>

  <div id="controls">
    <canvas id="waveform"></canvas>
    <button id="status-btn" onclick="openLogModal()" aria-label="Service status">
      <span id="status-dot"></span>
      <span id="status-label">checking</span>
    </button>
  </div>

  <script>
    const video = document.getElementById('video');
    const whepUrl = `http://${location.hostname}:8889/baby/whep`;

    const canvas = document.getElementById('waveform');
    const ctx = canvas.getContext('2d');
    let analyser, waveBuffer, audioCtx, pendingAudioStream;
    let history, histPos, lastTick;

    // --- Tuning knobs ---
    const SCROLL_MS = 150;      // ms per pixel scroll (higher = slower)
    const SENSITIVITY = 4;      // visual amplification (higher = more reactive)
    const YELLOW_THRESHOLD = 0.1; // fraction of max amplitude where green → yellow
    const RED_THRESHOLD = 0.3;    // fraction of max amplitude where yellow → red
    // --------------------

    function drawWaveform() {
      requestAnimationFrame(drawWaveform);
      if (!analyser) return;

      const now = performance.now();
      if (now - lastTick < SCROLL_MS) return;
      lastTick = now;

      analyser.getByteTimeDomainData(waveBuffer);
      let peak = 0;
      for (let i = 0; i < waveBuffer.length; i++) {
        peak = Math.max(peak, Math.abs(waveBuffer[i] - 128));
      }
      history[histPos++ % history.length] = peak / 128;

      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.lineWidth = 1;

      const colors = ['#4ade80', '#facc15', '#f87171'];
      const paths = [new Path2D(), new Path2D(), new Path2D()];
      for (let i = 0; i < w; i++) {
        const val = history[(histPos + i) % w];
        const amp = val * h * SENSITIVITY;
        const tier = val < YELLOW_THRESHOLD ? 0 : val < RED_THRESHOLD ? 1 : 2;
        paths[tier].moveTo(i + 0.5, h / 2 - amp);
        paths[tier].lineTo(i + 0.5, h / 2 + amp);
      }
      colors.forEach((color, i) => {
        ctx.strokeStyle = color;
        ctx.stroke(paths[i]);
      });
    }

    function setupAnalyser(stream) {
      audioCtx = new AudioContext();
      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0;
      waveBuffer = new Uint8Array(analyser.frequencyBinCount);
      source.connect(analyser);
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      history = new Float32Array(canvas.width).fill(0);
      histPos = 0;
      lastTick = 0;
    }

    new ResizeObserver(() => {
      const newW = canvas.offsetWidth;
      const newH = canvas.offsetHeight;
      if (newW === canvas.width && newH === canvas.height) return;
      canvas.width = newW;
      canvas.height = newH;
      if (history) {
        const oldW = history.length;
        const newHistory = new Float32Array(newW).fill(0);
        if (newW >= oldW) {
          for (let i = 0; i < oldW; i++)
            newHistory[newW - oldW + i] = history[(histPos + i) % oldW];
        } else {
          for (let i = 0; i < newW; i++)
            newHistory[i] = history[(histPos + oldW - newW + i) % oldW];
        }
        history = newHistory;
        histPos = 0;
      }
    }).observe(canvas);

    drawWaveform(); // start the loop once; guards on analyser being non-null

    let wasAudioActive = false;

    document.addEventListener('click', () => {
      if (pendingAudioStream && !audioCtx) {
        wasAudioActive = true;
        setupAnalyser(pendingAudioStream);
      } else if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    });

    const StreamStatus = Object.freeze({ UNKNOWN: 'unknown', CONNECTED: 'connected', RECONNECTING: 'reconnecting', FAILED: 'failed' });

    let pc = null;
    let reconnectTimer = null;
    let streamStatus = StreamStatus.UNKNOWN;

    function setStreamStatus(status) {
      streamStatus = status;
      switch (status) {
        case StreamStatus.RECONNECTING:
          statusBtn.className = 'err';
          statusLabel.textContent = 'reconnecting\u2026';
          break;
        case StreamStatus.FAILED:
          statusBtn.className = 'err';
          statusLabel.textContent = 'stream failed';
          break;
        // CONNECTED is handled by pollStatus on its next tick
      }
    }

    function reconnect() {
      if (pc) { pc.close(); pc = null; }
      video.srcObject = null;
      if (audioCtx) { audioCtx.close(); audioCtx = null; analyser = null; pendingAudioStream = null; }
      setStreamStatus(StreamStatus.RECONNECTING);
      setTimeout(() => start().catch(() => reconnect()), 2000);
    }

    async function start() {
      pc = new RTCPeerConnection();

      pc.ontrack = e => {
        if (e.track.kind === 'video') video.srcObject = e.streams[0];
        if (e.track.kind === 'audio') {
          pendingAudioStream = e.streams[0];
          if (wasAudioActive) setupAnalyser(pendingAudioStream);
        }
      };

      pc.onconnectionstatechange = () => {
        switch (pc.connectionState) {
          case 'connected':
            clearTimeout(reconnectTimer);
            streamStatus = StreamStatus.CONNECTED;
            statusBtn.className = 'ok';
            statusLabel.textContent = 'live';
            pollStatus();
            break;
          case 'disconnected':
            reconnectTimer = setTimeout(reconnect, 4000);
            setStreamStatus(StreamStatus.RECONNECTING);
            break;
          case 'failed':
          case 'closed':
            clearTimeout(reconnectTimer);
            setStreamStatus(StreamStatus.FAILED);
            reconnect();
            break;
        }
      };

      pc.addTransceiver('video', { direction: 'recvonly' });
      pc.addTransceiver('audio', { direction: 'recvonly' });

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      const res = await fetch(whepUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/sdp' },
        body: offer.sdp,
      });

      if (!res.ok) {
        document.body.insertAdjacentHTML('beforeend', `<p>Stream unavailable (${res.status})</p>`);
        return;
      }

      const answer = await res.text();
      await pc.setRemoteDescription({ type: 'answer', sdp: answer });
    }

    function toggleMute() {
      video.muted = !video.muted;
      const icon = video.muted ? 'volume_off' : 'volume_up';
      const label = video.muted ? 'Unmute' : 'Mute';
      const btn = document.getElementById('overlayMuteBtn');
      btn.innerHTML = `<span class="material-icons">${icon}</span>`;
      btn.setAttribute('aria-label', label);
    }

    function toggleFullscreen() {
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      } else {
        const el = document.getElementById('container');
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      }
    }

    document.addEventListener('fullscreenchange', updateFsBtn);
    document.addEventListener('webkitfullscreenchange', updateFsBtn);

    function updateFsBtn() {
      const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
      const btn = document.getElementById('overlayFsBtn');
      btn.innerHTML = `<span class="material-icons">${inFs ? 'fullscreen_exit' : 'fullscreen'}</span>`;
      btn.setAttribute('aria-label', inFs ? 'Exit fullscreen' : 'Fullscreen');
    }

    start().catch(err => {
      document.body.insertAdjacentHTML('beforeend', `<p>Error: ${err.message}</p>`);
    });

    // --- Status widget ---
    const statusBtn = document.getElementById('status-btn');
    const statusLabel = document.getElementById('status-label');

    async function pollStatus() {
      // Don't overwrite a stream-level error with a server-health "live"
      if (streamStatus === StreamStatus.RECONNECTING || streamStatus === StreamStatus.FAILED) return;
      try {
        const res = await fetch('/api/status');
        const services = await res.json();
        const down = services.filter(s => !s.active);
        if (down.length === 0) {
          statusBtn.className = 'ok';
          statusLabel.textContent = 'live';
        } else {
          statusBtn.className = 'err';
          statusLabel.textContent = down.map(s => s.name.replace('.service', '')).join(', ') + ' down';
        }
      } catch {
        statusBtn.className = 'err';
        statusLabel.textContent = 'unreachable';
      }
    }

    pollStatus();
    setInterval(pollStatus, 10_000);

    async function openLogModal() {
      document.getElementById('log-modal').classList.add('open');
      const pre = document.getElementById('log-content');
      pre.textContent = 'Loading…';
      try {
        const res = await fetch('/api/logs');
        pre.textContent = await res.text();
        pre.scrollTop = pre.scrollHeight;
      } catch (e) {
        pre.textContent = 'Failed to load logs: ' + e.message;
      }
    }

    function closeLogModal() {
      document.getElementById('log-modal').classList.remove('open');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLogModal();
    });
  </script>
</body>
</html>
