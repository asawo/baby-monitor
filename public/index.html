<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>May Monitor</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👶</text></svg>">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 16px;
      background: #f7f7f5;
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    h1 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin: 0 0 12px;
    }

    #container {
      position: relative;
      width: 100%;
      flex: 1;
      min-height: 0;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 4px;
      object-fit: contain;
      background: #000;
    }

    #controls {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      width: 100%;
      justify-content: flex-end;
      align-items: stretch;
    }

    #waveform {
      flex: 1;
      height: 40px;
      background: #111;
      border-radius: 4px;
      display: block;
    }

    button {
      padding: 8px;
      cursor: pointer;
      background: #111;
      color: #f7f7f5;
      border: none;
      border-radius: 4px;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:hover { background: #333; }

    #overlay {
      display: none;
      position: absolute;
      bottom: 16px;
      right: 16px;
      gap: 8px;
    }

    #overlay button {
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    #overlay button:hover { background: rgba(0, 0, 0, 0.8); }

    #overlay.visible { display: flex; }

    :fullscreen video,
    :-webkit-full-screen video { width: 100%; height: 100%; object-fit: contain; }

    :fullscreen #container,
    :-webkit-full-screen #container {
      width: 100%;
      height: 100%;
      max-width: none;
      background: #000;
    }
  </style>
</head>
<body>
  <h1>May Monitor</h1>

  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <div id="overlay">
      <button id="overlayMuteBtn" onclick="toggleMute()" aria-label="Unmute"><span class="material-icons">volume_off</span></button>
      <button onclick="exitFullscreen()" aria-label="Exit fullscreen"><span class="material-icons">fullscreen_exit</span></button>
    </div>
  </div>

  <div id="controls">
    <canvas id="waveform"></canvas>
    <button id="muteBtn" onclick="toggleMute()" aria-label="Unmute"><span class="material-icons">volume_off</span></button>
    <button id="fsBtn" onclick="toggleFullscreen()" aria-label="Fullscreen"><span class="material-icons">fullscreen</span></button>
  </div>

  <script>
    const video = document.getElementById('video');
    const whepUrl = `http://${location.hostname}:8889/baby/whep`;

    const canvas = document.getElementById('waveform');
    const ctx = canvas.getContext('2d');
    let analyser, waveBuffer, audioCtx, pendingAudioStream;
    let history, histPos, lastTick;

    // --- Tuning knobs ---
    const SCROLL_MS = 150;      // ms per pixel scroll (higher = slower)
    const SENSITIVITY = 4;      // visual amplification (higher = more reactive)
    const YELLOW_THRESHOLD = 0.2; // fraction of max amplitude where green → yellow
    const RED_THRESHOLD = 0.5;    // fraction of max amplitude where yellow → red
    // --------------------

    function drawWaveform() {
      requestAnimationFrame(drawWaveform);

      const now = performance.now();
      if (now - lastTick < SCROLL_MS) return;
      lastTick = now;

      analyser.getByteTimeDomainData(waveBuffer);
      let peak = 0;
      for (let i = 0; i < waveBuffer.length; i++) {
        peak = Math.max(peak, Math.abs(waveBuffer[i] - 128));
      }
      history[histPos++ % history.length] = peak / 128;

      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.lineWidth = 1;

      const colors = ['#4ade80', '#facc15', '#f87171'];
      const paths = [new Path2D(), new Path2D(), new Path2D()];
      for (let i = 0; i < w; i++) {
        const val = history[(histPos + i) % w];
        const amp = val * h * SENSITIVITY;
        const tier = val < YELLOW_THRESHOLD ? 0 : val < RED_THRESHOLD ? 1 : 2;
        paths[tier].moveTo(i + 0.5, h / 2 - amp);
        paths[tier].lineTo(i + 0.5, h / 2 + amp);
      }
      colors.forEach((color, i) => {
        ctx.strokeStyle = color;
        ctx.stroke(paths[i]);
      });
    }

    function setupAnalyser(stream) {
      audioCtx = new AudioContext();
      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0;
      waveBuffer = new Uint8Array(analyser.frequencyBinCount);
      source.connect(analyser);
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      history = new Float32Array(canvas.width).fill(0);
      histPos = 0;
      lastTick = 0;
      drawWaveform();
    }

    document.addEventListener('click', () => {
      if (pendingAudioStream && !audioCtx) setupAnalyser(pendingAudioStream);
      else if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    });

    async function start() {
      const pc = new RTCPeerConnection();

      pc.ontrack = e => {
        if (e.track.kind === 'video') video.srcObject = e.streams[0];
        if (e.track.kind === 'audio') pendingAudioStream = e.streams[0];
      };

      pc.addTransceiver('video', { direction: 'recvonly' });
      pc.addTransceiver('audio', { direction: 'recvonly' });

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      const res = await fetch(whepUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/sdp' },
        body: offer.sdp,
      });

      if (!res.ok) {
        document.body.insertAdjacentHTML('beforeend', `<p>Stream unavailable (${res.status})</p>`);
        return;
      }

      const answer = await res.text();
      await pc.setRemoteDescription({ type: 'answer', sdp: answer });
    }

    function toggleMute() {
      video.muted = !video.muted;
      const icon = video.muted ? 'volume_off' : 'volume_up';
      const label = video.muted ? 'Unmute' : 'Mute';
      const html = `<span class="material-icons">${icon}</span>`;
      document.getElementById('muteBtn').innerHTML = html;
      document.getElementById('muteBtn').setAttribute('aria-label', label);
      document.getElementById('overlayMuteBtn').innerHTML = html;
      document.getElementById('overlayMuteBtn').setAttribute('aria-label', label);
    }

    function toggleFullscreen() {
      const el = document.getElementById('container');
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }

    function exitFullscreen() {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }

    document.addEventListener('fullscreenchange', updateFsBtn);
    document.addEventListener('webkitfullscreenchange', updateFsBtn);

    function updateFsBtn() {
      const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
      document.getElementById('fsBtn').innerHTML = `<span class="material-icons">${inFs ? 'fullscreen_exit' : 'fullscreen'}</span>`;
      document.getElementById('fsBtn').setAttribute('aria-label', inFs ? 'Exit fullscreen' : 'Fullscreen');
      document.getElementById('overlay').classList.toggle('visible', inFs);
    }

    start().catch(err => {
      document.body.insertAdjacentHTML('beforeend', `<p>Error: ${err.message}</p>`);
    });
  </script>
</body>
</html>
